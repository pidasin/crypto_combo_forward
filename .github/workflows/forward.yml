name: 組合策略前向測試
on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 7 * * *'
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      test_discord:
        description: '強制推播一則測試訊息到 Discord'
        type: boolean
        default: false
permissions:
  contents: write
jobs:
  run-signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt

      - name: 每日訊號報告
        run: python forward_combo.py

      - name: 真模擬金帳戶 + 手機儀表板 + Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          DISCORD_TEST: ${{ inputs.test_discord }}
        run: python paper_account.py

      - name: Binance 測試網 bot (下單)
        env:
          BINANCE_TESTNET_KEY: ${{ secrets.BINANCE_TESTNET_KEY }}
          BINANCE_TESTNET_SECRET: ${{ secrets.BINANCE_TESTNET_SECRET }}
          DRY_RUN: ${{ vars.BOT_DRY_RUN || 'true' }}
        continue-on-error: true
        run: python binance_testnet_bot.py

      - name: 存回 repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A combo_forward_log.csv paper_log.csv paper_state.json index.html bot_log.csv bot_state.json || true
          git diff --staged --quiet || git commit -m "前向+模擬金 $(date -u +%Y-%m-%d)"
          git pull --rebase --autostash || true
          git push
