name: 組合策略前向測試
on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 7 * * *'
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run-signal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python forward_combo.py
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add combo_forward_log.csv
          git diff --staged --quiet || git commit -m "組合前向 $(date -u +%Y-%m-%d)"
          git push
